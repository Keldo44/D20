<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D20 Master Customizer</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        
        /* Interfaz de Usuario */
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 10px;
            background: rgba(15, 15, 15, 0.9);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
            z-index: 100;
            max-width: 400px;
            margin: 0 auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #bbb;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            flex: 1;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 35px;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #444; border-radius: 4px; }

        #roll-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        button {
            width: 100%;
            max-width: 300px;
            padding: 18px;
            font-size: 14px;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 4px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s ease;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Ajustes para Desktop */
        @media (min-width: 768px) {
            #ui-container { flex-direction: column; left: 20px; top: 20px; right: auto; width: 160px; }
            .control-group { flex-direction: row; justify-content: space-between; font-size: 11px; }
            input[type="color"] { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="control-group">
            <label>Cuerpo</label>
            <input type="color" id="picker-dado" value="#001a2c">
        </div>
        <div class="control-group">
            <label>Números</label>
            <input type="color" id="picker-texto" value="#ffffff">
        </div>
    </div>

    <div id="roll-container">
        <button id="roll-btn">Lanzar Dado</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- ESTADO INICIAL ---
        let colorDado = document.getElementById('picker-dado').value;
        let colorTexto = document.getElementById('picker-texto').value;
        let isRolling = false;

        // --- ESCENA Y RENDERER ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- ILUMINACIÓN NEUTRA ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
        keyLight.position.set(5, 8, 10);
        scene.add(keyLight);

        const rimLight = new THREE.PointLight(0xffffff, 10, 50);
        rimLight.position.set(-5, 5, -5);
        scene.add(rimLight);

        // --- DADO D20 ---
        const geometry = new THREE.IcosahedronGeometry(2, 0);
        
        // Orientación UV: Punta del triángulo arriba
        const uvAttr = geometry.attributes.uv;
        for (let i = 0; i < uvAttr.count; i += 3) {
            uvAttr.setXY(i, 0.5, 1.0);
            uvAttr.setXY(i + 1, 0.0, 0.0);
            uvAttr.setXY(i + 2, 1.0, 0.0);
        }

        function createFaceTexture(text, cBody, cText) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = cBody;
            ctx.fillRect(0, 0, 512, 512);
            
            ctx.fillStyle = cText;
            ctx.font = 'bold 160px "Georgia", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Sombra sutil para legibilidad
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 10;
            ctx.fillText(text, 256, 310);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return tex;
        }

        const materials = [];
        geometry.clearGroups();
        for (let i = 0; i < 20; i++) {
            const mat = new THREE.MeshPhysicalMaterial({ 
                map: createFaceTexture(i + 1, colorDado, colorTexto), 
                roughness: 0.15, 
                metalness: 0.05,
                clearcoat: 0.4
            });
            materials.push(mat);
            geometry.addGroup(i * 3, 3, i);
        }

        const die = new THREE.Mesh(geometry, materials);
        scene.add(die);

        // --- DATA DE CARAS PARA EL SNAP ---
        const facesData = [];
        const posAttr = geometry.attributes.position;
        for (let i = 0; i < posAttr.count; i += 3) {
            const vA = new THREE.Vector3().fromBufferAttribute(posAttr, i);
            const vB = new THREE.Vector3().fromBufferAttribute(posAttr, i + 1);
            const vC = new THREE.Vector3().fromBufferAttribute(posAttr, i + 2);
            // Normal (hacia dónde mira) y Up (vértice superior para rotación de números)
            const normal = new THREE.Vector3().crossVectors(vB.clone().sub(vA), vC.clone().sub(vA)).normalize();
            facesData.push({ normal, up: vA.clone().normalize() });
        }

        // --- FUNCIONES DE CONTROL ---
        function updateCamera() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.position.z = window.innerWidth < window.innerHeight ? 15 : 10;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', updateCamera);
        updateCamera();

        function updateRealTime() {
            colorDado = document.getElementById('picker-dado').value;
            colorTexto = document.getElementById('picker-texto').value;
            materials.forEach((mat, i) => {
                const oldTex = mat.map;
                mat.map = createFaceTexture(i + 1, colorDado, colorTexto);
                oldTex.dispose(); // Limpieza de memoria
            });
        }
        document.getElementById('picker-dado').addEventListener('input', updateRealTime);
        document.getElementById('picker-texto').addEventListener('input', updateRealTime);

        // --- LÓGICA DE LANZAMIENTO (SIN DEFORMACIÓN) ---
        const btn = document.getElementById('roll-btn');

        function roll() {
            if (isRolling) return;
            isRolling = true;
            btn.disabled = true;

            // 1. Fase de rotación caótica
            gsap.to(die.rotation, {
                x: die.rotation.x + Math.random() * 25 + 15,
                y: die.rotation.y + Math.random() * 25 + 15,
                z: die.rotation.z + Math.random() * 25 + 15,
                duration: 2.5,
                ease: "power4.out",
                onComplete: () => {
                    // 2. Cálculo de la cara que queda al frente
                    const camVec = new THREE.Vector3(0, 0, 1);
                    let maxDot = -1;
                    let bestFace = facesData[0];

                    facesData.forEach(face => {
                        const worldN = face.normal.clone().applyQuaternion(die.quaternion);
                        const dot = worldN.dot(camVec);
                        if (dot > maxDot) { maxDot = dot; bestFace = face; }
                    });

                    // 3. Crear el Cuaternión objetivo (orientado y recto)
                    const targetQ = new THREE.Quaternion();
                    const m = new THREE.Matrix4();
                    m.lookAt(bestFace.normal, new THREE.Vector3(0,0,0), bestFace.up);
                    targetQ.setFromRotationMatrix(m).invert();

                    // 4. Slerp Animado para evitar estiramientos/deformaciones
                    const startQ = die.quaternion.clone();
                    const proxy = { t: 0 };

                    gsap.to(proxy, {
                        t: 1,
                        duration: 1.2,
                        ease: "back.out(1.4)",
                        onUpdate: () => {
                            die.quaternion.slerpQuaternions(startQ, targetQ, proxy.t);
                        },
                        onComplete: () => { 
                            isRolling = false; 
                            btn.disabled = false; 
                            die.rotation.setFromQuaternion(die.quaternion);
                        }
                    });
                }
            });
        }

        btn.onclick = roll;

        function animate() {
            requestAnimationFrame(animate);
            if(!isRolling) { 
                die.rotation.y += 0.003; 
                die.rotation.z += 0.001; 
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
